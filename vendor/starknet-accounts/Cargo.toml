[package]
edition = "2021"
name = "starknet-accounts"
version = "0.16.0"
authors = ["Jonathan LEI <me@xjonathan.dev>"]
build = false
exclude = ["test-data/**"]
autolib = false
autobins = false
autoexamples = false
autotests = false
autobenches = false
description = """
Types for handling Starknet account abstraction
"""
homepage = "https://starknet.rs/"
readme = "README.md"
keywords = [
    "ethereum",
    "starknet",
    "web3",
]
license = "MIT OR Apache-2.0"
repository = "https://github.com/xJonathanLEI/starknet-rs"

[lib]
name = "starknet_accounts"
path = "src/lib.rs"

[[test]]
name = "ledger"
path = "tests/ledger.rs"

[[test]]
name = "single_owner_account"
path = "tests/single_owner_account.rs"

[dependencies.async-trait]
version = "0.1.68"

[dependencies.auto_impl]
version = "1.0.1"

[dependencies.starknet-core]
version = "0.16.0"

[dependencies.starknet-crypto]
version = "0.8.1"

[dependencies.starknet-providers]
version = "0.16.0"

[dependencies.starknet-signers]
version = "0.14.0"

[dependencies.thiserror]
version = "1.0.40"

[dev-dependencies.serde]
version = "1.0.160"
features = ["derive"]

[dev-dependencies.serde_json]
version = "1.0.96"

[dev-dependencies.tokio]
version = "1.27.0"
features = ["full"]

[dev-dependencies.url]
version = "2.3.1"

[target.'cfg(not(target_arch = "wasm32"))'.dev-dependencies.coins-ledger]
version = "0.12.0"
default-features = false

[target.'cfg(not(target_arch = "wasm32"))'.dev-dependencies.speculos-client]
